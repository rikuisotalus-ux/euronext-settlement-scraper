name: Euronext Settlement Scraper

on:
  schedule:
    - cron: "0 17 * * *"   # Ajetaan joka päivä klo 06:00 UTC
  workflow_dispatch:     # Sallii manuaalisen ajon nappia painamalla

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run scraper
        run: python scrape_euronext.py

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: euronext-settlement
          path: HLBY_settlement.csv

      - name: Commit CSV files to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/*.csv || echo "No CSV files to add"

          git diff --cached --quiet || git commit -m "Update Euronext settlement CSVs"

          git push
